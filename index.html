<!DOCTYPE html>
<html>
<head>
<title>Sonwa Wood Creations</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

header {
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card img {
    width:100%;
    border-radius:8px;
}

a {
    text-decoration:none;
    color:black;
}

.price { color:green; font-weight:bold; }
</style>
</head>

<body>

<header>
<h1>Sonwa Wood Creations</h1>
<p>Handcrafted wooden furniture for home and office</p>
</header>

<div class="grid">

<a href="product1.html">
<div class="card">
<img src="1.1.png">
<h3>Phone Stand</h3>
<p class="price">R650</p>
</div>
</a>

<a href="product2.html">
<div class="card">
<img src="1.2.png">
<h3>Monitor Desk</h3>
<p class="price">R2500</p>
</div>
</a>

</div>

</body>
</html>
